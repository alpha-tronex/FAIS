<main class="page">
  <h1>Admin data query</h1>
  <p class="description">
    Ask a question in plain language. The AI will turn it into a read-only MongoDB query over cases, users, appointments, employment, assets, and other allowed collections.
  </p>

  <p *ngIf="error" class="error">{{ error }}</p>

  <section class="mt16">
    <div class="formRow">
      <label for="question">What do you want to know?</label>
      <textarea
        id="question"
        [(ngModel)]="question"
        rows="3"
        placeholder="e.g. Show all users with roleTypeId 5, or list the last 20 cases, or appointments scheduled for next week."
        [disabled]="busy"
      ></textarea>
    </div>
    <div class="rowActions mt12">
      <button type="button" (click)="runQuery()" [disabled]="busy">
        {{ busy ? 'Running…' : 'Run query' }}
      </button>
    </div>
  </section>

  <section *ngIf="!busy && ranOnce && summary" class="mt16 summary">
    <div class="summaryHeader">
      <h2>Answer</h2>
      <button
        type="button"
        class="copyBtn"
        (click)="copyAnswer()"
        [attr.aria-label]="copied ? 'Copied' : 'Copy answer to clipboard'"
        [title]="copied ? 'Copied!' : 'Copy to clipboard'"
      >
        <svg class="copyIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path *ngIf="!copied" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
          <path *ngIf="copied" d="M5 13l4 4L19 7" />
        </svg>
        <span class="copyLabel">{{ copied ? 'Copied!' : 'Copy' }}</span>
      </button>
    </div>
    <p class="summaryText">{{ summary }}</p>
  </section>

  <section *ngIf="!busy && ranOnce && (count > 0 || results.length > 0)" class="mt16">
    <button type="button" class="linkBtn" (click)="showRawResults = !showRawResults">
      {{ showRawResults ? 'Hide' : 'Show' }} raw results ({{ count }})
    </button>
    <pre *ngIf="showRawResults" class="resultsJson">{{ results | json }}</pre>
  </section>

  <p *ngIf="!busy && !ranOnce && !error" class="mt16 hint">Enter a question and click Run query.</p>
</main>
